  ros__parameters:
    use_sim_time: True

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    # Goal checker parameters
    #precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25
    #  stateful: True
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    # DWB 대신 MPPI 설정 시작
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      motion_model: "Omni"

      # --- 속도 제한 설정 (로봇의 물리적 한계) ---
      vx_max: 0.3       # 최대 전진 속도 (m/s)
      vx_min: 0.0      # 최대 후진 속도
      vy_max: 0.3       # 최대 측면 속도 (Omni 로봇이므로 중요!)
      vy_min: 0.0
      wz_max: 0.3    # 최대 회전 속도 (rad/s)
      ax_max: 1.0
      ay_max: 1.0
      az_max: 1.0
      
      # --- 샘플링 설정 (MPPI가 경로를 탐색하는 범위) ---
      # 이 값들이 커질수록 로봇이 더 다양한 경로를 시도하지만, 너무 크면 주행이 떨릴 수 있습니다.
      vx_std: 0.4        
      vy_std: 0.4        
      wz_std: 0.7 #0.2 #0.5

      # temperature: 0.6
      # gamma: 0.015

      # --- MPPI 알고리즘 핵심 파라미터 ---
      time_steps: 40      # 예측할 타임스텝 수 (미래를 얼마나 멀리 볼 것인가)
      model_dt: 0.05      # 타임스텝 간의 시간 간격 (초)
      batch_size: 1000 #800    # 한 번에 시뮬레이션할 경로 후보의 수
      iteration_count: 1  # 최적화 반복 횟수


      # --- CBF critics (already tuned) ---
      critics: ["ConstraintCritic", 
                "CostCritic",
                "ObstaclesCritic", 
                "GoalCritic", 
                "GoalAngleCritic", 
                "PathAlignCritic", 
                "PathFollowCritic", 
                "AdaptiveHeadingCritic",
                "PathAngleCritic",
                "CBFCritic",
                "TwirlingCritic",
                ]

      TwirlingCritic:
        enabled: false
        cost_weight: 10.0


      ConstraintCritic: 
        enabled: true
        cost_weight: 5.0
        
      CostCritic:
        enabled: false

      ObstaclesCritic:
        enabled: false
        cost_power: 3
        critical_weight: 100.0       #100 충돌 직전 시 가중치
        repulsion_weight: 0.6       #1 장애물에서 멀어지게 하는 힘 
        collision_cost: 10000.0
        collision_margin_distance: 0.15
        consider_footprint: true
        inflation_radius: 0.6
        cost_scaling_factor: 2.0
        near_goal_distance: 0.5

      CBFCritic:
        enabled: true
        consider_footprint: true
        cost_power: 1
        cost_weight: 7.0 #5.0
        threshold_to_consider: 0.50
        threshold_dist: 0.05
        cbf_alpha: 0.4  #0.3
        collision_cost: 10000.0


      AdaptiveHeadingCritic:
        enabled: true
        cost_power: 1
        threshold_to_consider: 0.5

        # Path Angle Critic
        offset_from_furthest: 4
        path_angle_weight: 20.0
        max_angle_to_furthest: 1.2
        forward_preference: true

        # Heading Lock Critic
        heading_lock_weight: 3.0
        locked_heading: 0.0

        # scan / tf
        scan_topic: "/scan"
        global_frame: "odom"

        # Corridor Parameter
        corridor_width_min: 0.4
        corridor_width_max: 2.0
        single_corridor_lock_width_threshold: 1.15
        unlock_hysteresis_low: 1.10
        lock_hysteresis_high: 1.20


      GoalCritic: 
        enabled: true
        cost_weight: 5.0
        threshold_to_stop: 0.02
      
      GoalAngleCritic:
        enabled: true
        cost_weight: 2.0 #3.0
        threshold_to_stop: 1.0
        symmetric_yaw_tolerance: false

      
      PathAlignCritic:
        enabled: true
        cost_weight: 3.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4 #4
        threshold_to_stop: 0.05
      
      PathFollowCritic:
        enabled: true
        cost_weight: 5.0 #5.0
        offset_from_furthest: 4
        threshold_to_stop: 0.05

      PathAngleCritic:
        enabled: false
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.05


local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      # robot_radius: 0.22
      footprint: "[ [0.45, 0.2], [0.45, -0.2], [-0.45, -0.2], [-0.45, 0.2] ]" 
      # footprint: "[ [1.5, 0.35], [1.5, -0.35], [-1.5, -0.35], [-1.5, 0.35] ]"

      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0 #3
        inflation_radius: 0.45 # 0.05 is minimum value
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0 #3
        inflation_radius: 0.5 # 0.05 is minimum value
      always_send_full_costmap: True

map_server:
  ros__parameters:
    use_sim_time: True
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true     # false (Dijkstra)
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: True
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: True

waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.6, 0.6, 3.0] #0.26 0 1
    min_velocity: [-0.6, -0.6, -3.0] #0.26 0 1
    max_accel: [2.5, 2.5, 3.2] #-0-
    max_decel: [-2.5, -2.5, -3.2] #-0-
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0