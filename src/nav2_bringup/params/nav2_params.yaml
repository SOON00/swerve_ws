amcl:
  ros__parameters:
    use_sim_time: True
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint"
    beam_skip_distance: 0.02        # 0.5
    beam_skip_error_threshold: 0.5  # 0.9
    beam_skip_threshold: 0.05       # 0.3
    do_beamskip: true   # False
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: 0.2
    laser_model_type: "likelihood_field_prob"

    # added by Goat
    set_initial_pose: true  # default : false
    initial_pose: {x: 0.0, y: 0.0, z: 0.0, yaw: 0.0}  # default : {x: 0.0, y: 0.0, z: 0.0, yaw: 0.0}

    max_beams: 60
    max_particles: 2000   # 2000
    min_particles: 500    # 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::OmniMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.05   # 0.2 (default, BAD)  # 0.05 (GOOD)
    update_min_d: 0.05  # 0.25 (default, BAD)  # 0.05 (GOOD)
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan

